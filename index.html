<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Krossee Live Chat</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #ffffff;
      font: 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #2e3236;
    }
    #placeholder {
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      text-align: center;
      color: #6b7280;
    }
    #placeholder .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin: 0 3px;
      background: #14b8a6;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    #placeholder .dot:nth-child(1) { animation-delay: -0.32s; }
    #placeholder .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <div id="placeholder">
    <div>Connecting you to Krossee Support…</div>
    <div style="margin-top: 12px;">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <script type="text/javascript">
    (function () {
      var params = new URLSearchParams(window.location.search);
      var email = params.get('email') || '';
      var userId = params.get('nag_id') || params.get('user_id') || '';

      var _hsq = window._hsq = window._hsq || [];
      if (email || userId) {
        _hsq.push(['identify', { email: email, id: userId }]);
      }
      _hsq.push(['trackPageView']);

      window.hsConversationsOnReady = [function () {
        if (window.HubSpotConversations) {
          window.HubSpotConversations.widget.load({ widgetOpen: true });
        }
        var ph = document.getElementById('placeholder');
        if (ph) ph.style.display = 'none';
      }];
    })();
  </script>
  <script type="text/javascript" id="hs-script-loader" async defer
          src="https://js.hs-scripts.com/343359100.js"></script>
</body>
</html>
